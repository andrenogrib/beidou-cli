name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin: beidou
          - os: windows-latest
            bin: beidou.exe
          - os: macos-latest
            bin: beidou

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native image
        run: mvn package -DskipTests -Pnative

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beidou-${{ runner.os }}-${{ runner.arch }}
          path: target/${{ matrix.bin }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: beidou-*
          path: dist
          merge-multiple: false

      - name: Rename binaries for release
        run: |
          mkdir -p release
          cp dist/beidou-Linux-*/beidou        release/beidou-linux
          cp dist/beidou-Windows-*/beidou.exe  release/beidou-windows.exe
          cp dist/beidou-macOS-*/beidou        release/beidou-macos

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: release/*
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
